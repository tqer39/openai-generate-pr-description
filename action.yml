---
name: 'Generate Pull Request Title and Description'
description: 'Generate Pull Request Title and Description using OpenRouter API'
author: Takeru O'oyama @tqer39
branding:
  color: 'green'
  icon: 'code'

inputs:
  commit-log-history-limit:
    description: 'Commit log history limit'
    required: false
    default: '70'
  github-token:
    description: 'GitHub token'
    required: true
    default: ""
  api-key:
    description: 'OpenRouter API key'
    required: true
    default: ""
  model:
    description: 'Model identifier (OpenRouter format, e.g., openai/gpt-4o-mini, anthropic/claude-3.5-haiku)'
    required: false
    default: 'openai/gpt-4o-mini'
  max-tokens:
    description: 'Maximum completion tokens'
    required: false
    default: '1000'
  temperature:
    description: 'Sampling temperature (0.0-2.0)'
    required: false
    default: '0.1'
  locale:
    description: 'Locale for output language (en, ja, etc.)'
    required: false
    default: 'en'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6

    - name: pip upgrade
      run: python -m pip install --upgrade pip
      shell: bash

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        version: "0.11.3"

    - name: Setup uv
      run: |
        uv venv
        source .venv/bin/activate
        uv sync --no-dev --directory ${{ github.action_path }}
      shell: bash

    - name: Generate PR Title and Description
      env:
        API_KEY: ${{ inputs.api-key }}
        MODEL: ${{ inputs.model }}
        MAX_TOKENS: ${{ inputs.max-tokens }}
        TEMPERATURE: ${{ inputs.temperature }}
        COMMIT_LOG_HISTORY_LIMIT: ${{ inputs.commit-log-history-limit }}
        LOCALE: ${{ inputs.locale }}
      run: |
        uv run ${{ github.action_path }}/scripts/generate_pr_description.py > pr_output.txt
        cat pr_output.txt
      shell: bash

    - name: Update PR Title and Description
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_NUMBER=${{ github.event.pull_request.number }}
        PR_TITLE=$(head -n 1 pr_output.txt)
        PR_BODY=$(tail -n +2 pr_output.txt)
        gh pr edit $PR_NUMBER --title "$PR_TITLE" --body "$PR_BODY"
      shell: bash
