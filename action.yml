---
name: 'AI: Generate Pull Request Title and Description'
description: 'Generate Pull Request Title and Description using AI (OpenAI, Anthropic, Google Gemini, etc.)'
author: Takeru O'oyama @tqer39
branding:
  color: 'green'
  icon: 'code'

inputs:
  commit-log-history-limit:
    description: 'Commit log history limit'
    required: false
    default: '70'
  github-token:
    description: 'GitHub token'
    required: true
    default: ""
  provider:
    description: 'AI provider (openai, anthropic, gemini, etc.)'
    required: false
    default: 'openai'
  model:
    description: 'Model name (e.g., gpt-4o-mini, claude-sonnet-4-20250514, gemini-2.0-flash)'
    required: false
    default: 'gpt-4o-mini'
  api-key:
    description: 'API key for the selected provider'
    required: true
    default: ""
  api-base-url:
    description: 'Custom API base URL (optional, for self-hosted or proxy endpoints)'
    required: false
    default: ''
  max-tokens:
    description: 'Maximum tokens for the response'
    required: false
    default: '1000'
  temperature:
    description: 'Temperature for generation (0.0-2.0)'
    required: false
    default: '0.1'
  locale:
    description: 'Locale for output language (en, ja, etc.)'
    required: false
    default: 'en'
  # Deprecated inputs (backward compatibility)
  openai-api-key:
    description: '[DEPRECATED] Use api-key instead'
    required: false
    default: ''
    deprecationMessage: 'Use api-key instead'
  openai-model:
    description: '[DEPRECATED] Use model instead'
    required: false
    default: ''
    deprecationMessage: 'Use model instead'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6

    - name: pip upgrade
      run: python -m pip install --upgrade pip
      shell: bash

    - name: Install uv
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      with:
        version: "0.4.26"

    - name: Setup uv
      run: |
        uv venv
        source .venv/bin/activate
        uv sync --no-dev --directory ${{ github.action_path }}
      shell: bash

    - name: Generate PR Title and Description
      env:
        PROVIDER: ${{ inputs.provider }}
        MODEL: ${{ inputs.model }}
        API_KEY: ${{ inputs.api-key }}
        API_BASE_URL: ${{ inputs.api-base-url }}
        MAX_TOKENS: ${{ inputs.max-tokens }}
        TEMPERATURE: ${{ inputs.temperature }}
        COMMIT_LOG_HISTORY_LIMIT: ${{ inputs.commit-log-history-limit }}
        LOCALE: ${{ inputs.locale }}
        # Legacy fallback (read by Python script)
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
      run: |
        uv run ${{ github.action_path }}/scripts/generate_pr_description.py > pr_output.txt
        cat pr_output.txt
      shell: bash

    - name: Update PR Title and Description
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_NUMBER=${{ github.event.pull_request.number }}
        PR_TITLE=$(head -n 1 pr_output.txt)
        PR_BODY=$(tail -n +2 pr_output.txt)
        gh pr edit $PR_NUMBER --title "$PR_TITLE" --body "$PR_BODY"
      shell: bash
